---
- name: "Start maintenance: target={{ target.k8s_node }} / nova={{ target.nova_compute_host }}"
  ansible.builtin.debug:
    msg: "Draining k8s node {{ target.k8s_node }} and evacuating Nova host {{ target.nova_compute_host }}"

- block:
    - name: Check Kubernetes node exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        name: "{{ target.k8s_node }}"
      register: k8s_node_info

    - name: Fail if Kubernetes node not found
      ansible.builtin.assert:
        that:
          - k8s_node_info.resources | length == 1
        fail_msg: "Kubernetes node {{ target.k8s_node }} was not found."

    - name: Fetch Nova compute service info
      openstack.cloud.compute_service_info:
        binary: nova-compute
        host: "{{ target.nova_compute_host }}"
        cloud: "{{ openstack_cloud | default(omit) }}"
      register: nova_compute_services
      failed_when: false

    - name: Fail if nova-compute service not found
      ansible.builtin.assert:
        that:
          - nova_compute_services.compute_services is defined
          - nova_compute_services.compute_services | length > 0
        fail_msg: "No nova-compute service found for host {{ target.nova_compute_host }}."

    - name: Cordon Kubernetes node
      block:
        - name: Show cordon command
          ansible.builtin.debug:
            msg: "DRY-RUN: kubectl cordon {{ target.k8s_node }}"
          when: dry_run
        - name: Cordon node
          ansible.builtin.command:
            argv:
              - kubectl
              - cordon
              - "{{ target.k8s_node }}"
          when: not dry_run
      delegate_to: localhost

    - name: Drain Kubernetes node
      block:
        - name: Show drain command
          ansible.builtin.debug:
            msg: >-
              DRY-RUN: kubectl drain {{ target.k8s_node }}
              {{ kubectl_drain_extra_args | join(' ') }}
              --timeout={{ kubectl_drain_timeout }}
          when: dry_run
        - name: Drain node
          ansible.builtin.command:
            argv: "{{ ['kubectl', 'drain', target.k8s_node] + kubectl_drain_extra_args + ['--timeout=' ~ kubectl_drain_timeout] }}"
          when: not dry_run
      delegate_to: localhost

    - name: Disable nova-compute service
      block:
        - name: Show disable command
          ansible.builtin.debug:
            msg: "DRY-RUN: openstack compute service set --disable --disable-reason '{{ nova_disable_reason }}' {{ target.nova_compute_host }} nova-compute"
          when: dry_run
        - name: Disable compute service
          ansible.builtin.command:
            argv:
              - openstack
              - compute
              - service
              - set
              - --disable
              - --disable-reason
              - "{{ nova_disable_reason }}"
              - "{{ target.nova_compute_host }}"
              - nova-compute
          register: disable_compute
          failed_when: disable_compute.rc != 0
          when: not dry_run
      delegate_to: localhost

    - name: Gather all Nova servers
      openstack.cloud.server_info:
        all_projects: true
        cloud: "{{ openstack_cloud | default(omit) }}"
      register: all_servers

    - name: Identify servers on target host
      ansible.builtin.set_fact:
        servers_on_target_host: >-
          {{
            (all_servers.servers | default([]))
            | selectattr('OS-EXT-SRV-ATTR:host', 'defined')
            | selectattr('OS-EXT-SRV-ATTR:host', 'equalto', target.nova_compute_host)
            | list
          }}

    - name: Split amphora and migratable instances
      ansible.builtin.set_fact:
        amphora_servers_on_target_host: >-
          {{
            servers_on_target_host
            | selectattr('name', 'match', '^amphora-.*')
            | list
          }}
        migratable_servers_on_target_host: >-
          {{
            servers_on_target_host
            | rejectattr('name', 'match', '^amphora-.*')
            | list
            if exclude_amphora_from_migration | bool
            else servers_on_target_host
          }}

    - name: Log server classification
      ansible.builtin.debug:
        msg:
          - "Found {{ servers_on_target_host | length }} total servers on {{ target.nova_compute_host }}"
          - "Amphora excluded: {{ amphora_servers_on_target_host | map(attribute='id') | list if exclude_amphora_from_migration | bool else [] }}"
          - "Migratable servers: {{ migratable_servers_on_target_host | map(attribute='id') | list }}"

    - name: Copy migrate helper to control host
      ansible.builtin.copy:
        src: migrate_server.py
        dest: /tmp/migrate_server.py
        mode: "0755"
      delegate_to: localhost

    - name: Install openstacksdk on control host
      ansible.builtin.pip:
        name: "{{ openstack_sdk_requirements }}"
        executable: "{{ openstack_sdk_python }}"
      register: pip_install_result
      when: not dry_run
      delegate_to: localhost

    - name: Live migrate Nova instances off host with helper
      vars:
        cloud_arg: "{{ '--cloud ' ~ openstack_cloud if openstack_cloud is defined and openstack_cloud else '' }}"
        dry_arg: "{{ '--dry-run' if dry_run else '' }}"
        migrate_cmd_tmp: >-
          {{ openstack_sdk_python }}
          /tmp/migrate_server.py
          --server {{ item.id }}
          --wait
          {{ dry_arg }}
          {{ cloud_arg }}
      ansible.builtin.shell: "{{ migrate_cmd_tmp }}"
      loop: "{{ migratable_servers_on_target_host }}"
      loop_control:
        label: "{{ item.id }}"
      register: migrate_results
      failed_when: (migrate_results is failed) and (not dry_run)
      changed_when: (migrate_results is defined) and (migrate_results.rc == 0) and (not dry_run)
      delegate_to: localhost
      when: migratable_servers_on_target_host | length > 0

    - name: Wait until no non-amphora servers remain on the compute host
      openstack.cloud.server_info:
        all_projects: true
        cloud: "{{ openstack_cloud | default(omit) }}"
      register: all_servers_refresh
      retries: "{{ nova_poll_retries }}"
      delay: "{{ nova_poll_delay }}"
      until: >-
        (
          all_servers_refresh.servers | default([])
          | selectattr('OS-EXT-SRV-ATTR:host', 'defined')
          | selectattr('OS-EXT-SRV-ATTR:host', 'equalto', target.nova_compute_host)
          | rejectattr('name', 'match', '^amphora-.*')
          | list
          | length
        ) == 0
      when: not dry_run

    - name: Build remaining instance lists
      ansible.builtin.set_fact:
        remaining_servers_on_target: >-
          {{
            all_servers_refresh.servers | default([])
            | selectattr('OS-EXT-SRV-ATTR:host', 'defined')
            | selectattr('OS-EXT-SRV-ATTR:host', 'equalto', target.nova_compute_host)
            | list
          }}
        remaining_non_amphora_servers_on_target: >-
          {{
            all_servers_refresh.servers | default([])
            | selectattr('OS-EXT-SRV-ATTR:host', 'defined')
            | selectattr('OS-EXT-SRV-ATTR:host', 'equalto', target.nova_compute_host)
            | rejectattr('name', 'match', '^amphora-.*')
            | list
          }}
      when: not dry_run

    - name: Debug remaining non-amphora servers after wait
      ansible.builtin.debug:
        msg: >-
          Remaining non-amphora servers on {{ target.nova_compute_host }}:
          {{
            remaining_non_amphora_servers_on_target
            | map(attribute='id')
            | list
          }}
      when: not dry_run

    - name: Fail if non-amphora instances still remain
      ansible.builtin.assert:
        that:
          - remaining_non_amphora_servers_on_target | length == 0
        fail_msg: >-
          Host {{ target.nova_compute_host }} still has non-amphora instances:
          {{ remaining_non_amphora_servers_on_target | map(attribute='id') | list }}
      when: not dry_run

    - name: Show remaining amphora instances
      ansible.builtin.debug:
        msg: >-
          Remaining amphora on {{ target.nova_compute_host }}:
          {{
            remaining_servers_on_target
            | selectattr('name', 'match', '^amphora-.*')
            | map(attribute='id')
            | list
          }}
      when: not dry_run

    - name: Verify Kubernetes node is unschedulable
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        name: "{{ target.k8s_node }}"
      register: k8s_node_post_drain

    - name: Fail if Kubernetes node is still schedulable
      ansible.builtin.assert:
        that:
          - k8s_node_post_drain.resources[0].spec.unschedulable | default(false) | bool
        fail_msg: "Kubernetes node {{ target.k8s_node }} is still schedulable after drain."

    - name: Optionally delete nova-compute service entry
      block:
        - name: Show delete command
          ansible.builtin.debug:
            msg: "DRY-RUN: openstack compute service delete {{ nova_compute_services.compute_services[0].id }}"
          when: dry_run
        - name: Delete compute service entry
          ansible.builtin.command:
            argv:
              - openstack
              - compute
              - service
              - delete
              - "{{ nova_compute_services.compute_services[0].id }}"
          when: not dry_run
      when: nova_delete_service_when_empty | bool
      delegate_to: localhost

  rescue:
    - name: Attempt to re-enable nova-compute service after failed drain
      block:
        - name: Show re-enable command
          ansible.builtin.debug:
            msg: "DRY-RUN: openstack compute service set --enable {{ target.nova_compute_host }} nova-compute"
          when: dry_run
        - name: Re-enable nova compute
          ansible.builtin.command:
            argv:
              - openstack
              - compute
              - service
              - set
              - --enable
              - "{{ target.nova_compute_host }}"
              - nova-compute
          when: not dry_run
          ignore_errors: true
      delegate_to: localhost

    - name: Attempt to uncordon k8s node after failed drain
      block:
        - name: Show uncordon
          ansible.builtin.debug:
            msg: "DRY-RUN: kubectl uncordon {{ target.k8s_node }}"
          when: dry_run
        - name: Attempt uncordon
          ansible.builtin.command:
            argv:
              - kubectl
              - uncordon
              - "{{ target.k8s_node }}"
          when: not dry_run
          ignore_errors: true
      delegate_to: localhost

    - name: Fail with context
      ansible.builtin.fail:
        msg: "Drain or evacuation failed for host {{ target.nova_compute_host }}. See prior tasks for details."

  always:
    - name: Summary for target
      ansible.builtin.debug:
        msg:
          - "Completed processing target {{ target.nova_compute_host }} (action=drain)"
