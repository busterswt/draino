---
- name: Validate input
  ansible.builtin.assert:
    that:
      - target_hosts is defined
      - target_hosts | length > 0
      - action in ['drain', 'restore']
    fail_msg: "Provide target_hosts and set action to 'drain' or 'restore'."

- name: Informational requirements
  ansible.builtin.debug:
    msg:
      - "This role expects kubernetes.core and openstack.cloud collections."
      - "Some operations use openstacksdk or CLI fallback."
  changed_when: false

- name: Process target hosts for drain
  ansible.builtin.include_tasks: drain_host.yml
  when: action == 'drain'
  loop: "{{ target_hosts }}"
  loop_control:
    loop_var: target

- name: Process target hosts for restore
  ansible.builtin.include_tasks: restore_host.yml
  when: action == 'restore'
  loop: "{{ target_hosts }}"
  loop_control:
    loop_var: target
